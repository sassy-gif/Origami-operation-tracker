<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Origami — Operations Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="authwrap" id="authwrap">
    <div class="authcard">
      <div class="ahead">
        <div class="mark">ORIGAMI</div>
        <div class="tag">Operations</div>
      </div>

      <div class="abody">
        <div class="field"><label>Work email</label><input type="email" id="loginEmail" autocomplete="username" /></div>
        <div class="field"><label>Password</label><input type="password" id="loginPass" autocomplete="current-password" /></div>
        
        <div class="autherr" id="loginErr"></div>
        <button class="btn" id="loginBtn" style="width:100%">Sign in</button>
        <button id="signupBtn">Sign Up</button>
      </div>
    </div>
  </div>
   <div id="pendingScreen" style="display:none;">
  <h2>Waiting for approval</h2>
  <p>Your account has been created. An admin needs to approve your access before you can use the tracker.</p>
  <button id="pendingSignOutBtn">Sign out</button>
     </div>
<aside class="side" id="side" style="display:none">
  <div class="brand">
    <div class="mark">ORIGAMI</div>
    <div class="tag">Operations</div>
  </div>
  <div class="profile-snippet" id="profileSnippet">
    <div class="avatar-circle" id="avatarInitial"></div>
    <div class="profile-snippet-text">
      <div class="ps-name" id="psName"></div>
      <div class="ps-role" id="psRole"></div>
    </div>
  </div>
    <nav class="nav" id="nav">
      <button data-view="dashboard" class="on"><span class="ic"></span> Dashboard</button>
      <button data-view="clients"><span class="ic"></span> Clients</button>
      <button data-view="projects"><span class="ic"></span> Projects</button>
      <button data-view="team"><span class="ic"></span> Team</button>
      <button data-view="tasks"><span class="ic"></span> Tasks</button>
      <button data-view="profile"><span class="ic"></span> Profile</button>
      <button data-view="calendar"><span class="ic"></span> Calendar</button>
    </nav>
    <div class="who">
      Signed in as<br><span class="you" id="whoEmail"></span>
      <button id="signOutBtn">Sign out</button>
    </div>
    <div class="foot">Strategy &middot; Growth &middot; Excellence<br>Shared with your team &middot; saved automatically.</div>
  </aside>

 <main class="main" id="main" style="display:none">
  <div class="top">
    <div>
      <div class="eyebrow" id="eyebrow">Command Center</div>
      <h1 id="title">Dashboard</h1>
    </div>
    <div class="global-search-wrap">
      <input class="global-search" id="globalSearch" placeholder="Search..." autocomplete="off" />
      <div class="global-search-results" id="globalSearchResults"></div>
    </div>
    <div class="spacer"></div>
    <input class="search" id="search" placeholder="Search..." style="display:none" />
    <button class="btn" id="addBtn" style="display:none">+ Add</button>
  </div>
  <div class="content" id="content"></div>
</main>

  <div class="overlay" id="overlay">
    <div class="modal" id="modal"></div>
  </div>
  <div class="toast" id="toast"></div>
<script type="module" src="app.js"></script>
</body>
</html>
